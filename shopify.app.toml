# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "d5491ebe90429bfc8b66f867f572f09e"
name = "Convobridge"
application_url = "https://later-combining-suggestions-implications.trycloudflare.com"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "write_products"

[auth]
redirect_urls = [ "https://later-combining-suggestions-implications.trycloudflare.com/api/auth" ]

[app_proxy]
url = "https://later-combining-suggestions-implications.trycloudflare.com/proxy"
prefix = "apps"
subpath = "chat"
